# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: hisense-tv-assistant-maf
description: |-
    Microsoft Agent Framework (MAF) hosted agent for the Hisense TV remote-key sports assistant, built with the Agent Harness (create_harness_agent): agentic todo planning, plan/execute modes, context compaction, Foundry Skills, and native GenAI OpenTelemetry tracing. Reuses the same seven tools as the LangGraph twin — Foundry IQ program-library retrieval, Web IQ grounding, EPG schedule / live-score / tune-to-channel, and cross-session viewer memory.
metadata:
    tags:
        - AI Agent Hosting
        - Responses Protocol
        - Microsoft Agent Framework
        - Agent Harness
        - Foundry IQ
        - Web IQ
        - Foundry Memory
        - Observability
        - Python
protocols:
    - protocol: responses
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4.1-mini
    - name: FOUNDRY_IQ_ENDPOINT
      value: 'https://hisense-poc-search-06211057.search.windows.net'
    - name: FOUNDRY_IQ_KNOWLEDGE_BASE
      value: 'hisense-kb'
    - name: FOUNDRY_IQ_KNOWLEDGE_SOURCE
      value: 'hisense-kb-source'
    - name: WEBIQ_API_KEY
      value: 'TKlEDrvFhhh7EhHjxyiMhjBZ3qb863S165c1x2tSdRg='
    - name: WEBIQ_BASE_URL
      value: 'https://api.microsoft.ai/v3'
    - name: MEMORY_STORE_NAME
      value: 'hisense-viewer-memory'
    - name: MEMORY_EMBEDDING_DEPLOYMENT
      value: 'text-embedding-3-small'
    - name: MEMORY_DEFAULT_VIEWER
      value: 'demo-viewer'
    # MAF is natively instrumented; Foundry Hosted Agents manage the OTel
    # exporters and inject APPLICATIONINSIGHTS_CONNECTION_STRING on deploy.
    # ENABLE_SENSITIVE_DATA also records prompts/tool args into the traces.
    - name: ENABLE_SENSITIVE_DATA
      value: "true"
    - name: OTEL_AUTO_CONFIGURE_AZURE_MONITOR
      value: "true"
    - name: AZURE_TRACING_GEN_AI_CONTENT_RECORDING_ENABLED
      value: "true"
    - name: SKILLS_SOURCE
      value: "auto"
    - name: SKILLS_TOOLBOX_NAME
      value: "hisense-tv-skills"
code_configuration:
    runtime: python_3_13
    entry_point: main.py
    dependency_resolution: remote_build
