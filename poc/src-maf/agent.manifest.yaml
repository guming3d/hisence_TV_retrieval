# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/AgentManifest.yaml
name: hisense-tv-assistant-maf
displayName: "Hisense TV Sports AI Assistant (Microsoft Agent Framework, Harness, Responses)"
description: >
  Microsoft Agent Framework (MAF) hosted agent for the Hisense TV remote-key
  sports assistant, built with the Agent Harness (create_harness_agent):
  agentic todo planning, plan/execute modes, context compaction, Foundry
  Skills, and native GenAI OpenTelemetry tracing. Reuses the same seven tools
  as the LangGraph twin — Foundry IQ program-library retrieval, Web IQ
  grounding, EPG schedule / live-score / tune-to-channel, and cross-session
  viewer memory.
metadata:
  tags:
    - AI Agent Hosting
    - Responses Protocol
    - Microsoft Agent Framework
    - Agent Harness
    - Foundry IQ
    - Web IQ
    - Foundry Memory
    - Observability
    - Python
template:
  name: hisense-tv-assistant-maf
  kind: hosted
  protocols:
    - protocol: responses
      version: 1.0.0
  environment_variables:
    # FOUNDRY_PROJECT_ENDPOINT and APPLICATIONINSIGHTS_CONNECTION_STRING are
    # injected by the platform (hosted) / translated by azd (local) — do NOT
    # declare them here.
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: "{{AZURE_AI_MODEL_DEPLOYMENT_NAME}}"
    - name: FOUNDRY_IQ_ENDPOINT
      value: "{{FOUNDRY_IQ_ENDPOINT}}"
    - name: FOUNDRY_IQ_KNOWLEDGE_BASE
      value: "{{FOUNDRY_IQ_KNOWLEDGE_BASE}}"
    - name: WEBIQ_API_KEY
      value: "{{WEBIQ_API_KEY}}"
    - name: WEBIQ_BASE_URL
      value: "{{WEBIQ_BASE_URL}}"
    - name: ENABLE_SENSITIVE_DATA
      value: "true"
    - name: OTEL_AUTO_CONFIGURE_AZURE_MONITOR
      value: "true"
    - name: AZURE_TRACING_GEN_AI_CONTENT_RECORDING_ENABLED
      value: "true"
resources:
  - kind: model
    id: gpt-4.1-mini
    name: AZURE_AI_MODEL_DEPLOYMENT_NAME
